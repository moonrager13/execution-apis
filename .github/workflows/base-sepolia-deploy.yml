name: Base Sepolia Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run compile
      - run: npm test
      - name: Deployment readiness
        run: echo "Configure Base RPC and signing secrets before deployment"
