name: Base Mainnet Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to authorize mainnet deployment'
        required: true
        default: ''

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.inputs.confirm == 'DEPLOY'
    runs-on: ubuntu-latest
    environment: base-mainnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm test

      - name: Deploy Base Mainnet
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: npm run deploy:base

      - name: Verify Deployment
        env:
          AGENT_EXECUTOR_ADDRESS: ${{ secrets.AGENT_EXECUTOR_ADDRESS }}
        run: node agent/verify-after-deploy.js

      - name: Start Agent Workflow
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          AGENT_APPROVED: 'false'
        run: npm run agent:execute
