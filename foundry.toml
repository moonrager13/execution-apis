recipe = "foundry"
authors = ["moonrager13"]

[profile.default]
solc-version = "0.8.19"
optimizer = true
optimizer_runs = 200
remappings = [
  "ds-test/=lib/ds-test/src/",
  "forge-std/=lib/forge-std/src/",
]

[profile.default.rpc_endpoints]
mainnet = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
sepolia = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}"
polygon = "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"
arbitrum = "https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}"

[profile.default.etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io" }
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io" }
polygon = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.polygonscan.com" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io" }

[dependencies]
ds-test = { git = "https://github.com/dapphub/ds-test", rev = "cd98eff" }
forge-std = { git = "https://github.com/foundry-rs/forge-std", rev = "2a2ce3c" }
